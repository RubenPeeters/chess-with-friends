<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess with Friends</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Tokens ───────────────────────────────────────────────────────────── */
      :root {
        --primary:                   #005ab7;
        --primary-end:               #0072e5;
        --primary-gradient:          linear-gradient(135deg, #005ab7, #0072e5);
        --on-primary:                #ffffff;

        --surface-lowest:            #ffffff;
        --surface:                   #f7f9fc;
        --surface-low:               #f2f4f7;
        --surface-high:              #eaecef;
        --surface-highest:           #e0e3e6;

        --on-surface:                #191c1e;
        --on-surface-muted:          #5a6270;

        --secondary-fixed:           #d9e4eb;

        --ghost-border:              rgba(25, 28, 30, 0.15);
        --ambient-shadow:            0 8px 32px rgba(25, 28, 30, 0.04);
        --ambient-shadow-raised:     0 12px 40px rgba(25, 28, 30, 0.08);

        --font-display:              'Manrope', sans-serif;
        --font-mono:                 'IBM Plex Mono', monospace;
        --font-body:                 'Inter', sans-serif;

        --radius-sm:                 0.5rem;
        --radius-md:                 0.75rem;
        --radius-xl:                 3rem;

        --space-3:                   0.75rem;
        --space-4:                   1rem;
        --space-6:                   1.5rem;
        --space-8:                   2rem;
        --space-12:                  3rem;
        --space-24:                  6rem;
      }

      /* ── Reset ────────────────────────────────────────────────────────────── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body, #root {
        height: 100%;
      }

      body {
        font-family: var(--font-body);
        font-size: 1rem;
        line-height: 1.5;
        background: var(--surface);
        color: var(--on-surface);
        -webkit-font-smoothing: antialiased;
      }

      /* ── Focus ring — accessibility ───────────────────────────────────────── */
      :focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 3px;
      }

      /* ── Ghost border on inputs ───────────────────────────────────────────── */
      input:focus {
        outline: none;
        box-shadow: inset 0 0 0 1.5px var(--ghost-border), var(--ambient-shadow);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
